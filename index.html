<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Sosmed</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#0a0a0a;color:#fff;padding:20px}
.container{max-width:1400px;margin:0 auto}
h1{font-size:28px;margin-bottom:8px}
.subtitle{color:#4caf50;font-size:14px;margin-bottom:20px}
.filters{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.filters select,.filters input{background:#1a1a1a;border:1px solid #333;color:#fff;padding:8px 12px;border-radius:6px}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.kpi{background:#1a1a1a;padding:20px;border-radius:8px;border:1px solid #333}
.kpi-label{font-size:12px;color:#888;margin-bottom:8px}
.kpi-value{font-size:28px;font-weight:700}
.charts{display:grid;grid-template-columns:repeat(auto-fit,minmax(400px,1fr));gap:16px;margin-bottom:24px}
.chart-box{background:#1a1a1a;padding:20px;border-radius:8px;border:1px solid #333}
.chart-title{font-size:14px;margin-bottom:12px;color:#aaa}
table{width:100%;background:#1a1a1a;border-collapse:collapse;border-radius:8px;overflow:hidden}
th,td{padding:12px;text-align:left;border-bottom:1px solid #333;font-size:14px}
th{background:#222;color:#aaa;font-weight:600}
.debug{margin-top:20px;padding:12px;background:#1a1a1a;border-radius:6px;font-size:12px;color:#888;white-space:pre-wrap}
</style>
</head>
<body>
<div class="container">
<h1>Dashboard Sosmed</h1>
<div class="subtitle" id="status">Loading data dari Google Sheet...</div>
<div class="filters">
<input type="date" id="startDate"><input type="date" id="endDate">
<select id="brandFilter"><option value="">Semua Brand</option></select>
</div>
<div class="kpis">
<div class="kpi"><div class="kpi-label">Total Followers</div><div class="kpi-value" id="kpiFollowers">0</div></div>
<div class="kpi"><div class="kpi-label">Total Reach</div><div class="kpi-value" id="kpiReach">0</div></div>
<div class="kpi"><div class="kpi-label">Total Engagement</div><div class="kpi-value" id="kpiEng">0</div></div>
<div class="kpi"><div class="kpi-label">Total Data</div><div class="kpi-value" id="kpiPosts">0</div></div>
</div>
<div class="charts">
<div class="chart-box"><div class="chart-title">Followers by Brand (Latest Valid)</div><canvas id="chartBrand"></canvas></div>
<div class="chart-box"><div class="chart-title">Reach by Brand (Latest Valid)</div><canvas id="chartReach"></canvas></div>
</div>
<table>
<thead><tr><th>Waktu Push</th><th>Brand</th><th>Periode</th><th>Reach</th><th>Engagement</th><th>Followers</th></tr></thead>
<tbody id="tableBody"></tbody>
</table>
<div class="debug" id="debug"></div>
</div>
<script>
const CSV_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vQAEUueYms0SnC-JXracRWmYLZ55VqptcgNGGpAWpnMqIQU7oFhd8KWO4ZXr85ZzOLvfBQX0I9aLEHr/pub?gid=269503424&single=true&output=csv';
let allData=[], charts={};

function toNum(v){
 if(v===null||v===undefined) return 0;
 let s=String(v).trim();
 if(s===''||s==='—'||s==='-'||s==='–') return 0;
 // contoh: "245.881 akun" -> "245881", "1.077 per Reels" -> "1077", "❗581" -> "581"
 s=s.split('(')[0];
 s=s.replace(/[^0-9]/g,'');
 if(s==='') return 0;
 return parseInt(s,10)||0;
}
function formatNum(n){
 if(n>=1e6) return (n/1e6).toFixed(1)+'M';
 if(n>=1e3) return (n/1e3).toFixed(1)+'K';
 return n.toLocaleString('id-ID');
}
function normalizeBrand(b){
 b=String(b).trim().toLowerCase();
 if(b.includes('sedjati eco')) return 'SEF';
 if(b.includes('labbaik')) return 'Labbaik Chicken';
 if(b.includes('waydee')) return 'Waydee';
 if(b.includes('sedjati coffe')) return 'Sedjati Coffee';
 if(b.includes('luqman')||b==='lh') return 'LH';
 if(b.includes('baso')) return 'Baso Kajojo';
 if(b.includes('spud')) return 'Spud Potata';
 if(b.includes('obie')) return 'Obie Donat';
 if(b==='ofc') return 'OFC';
 return b.toUpperCase();
}

async function loadData(){
 try{
  document.getElementById('status').textContent='Fetching...';
  const res=await fetch(CSV_URL);
  if(!res.ok) throw new Error('Fetch failed '+res.status);
  const csv=await res.text();
  document.getElementById('debug').textContent='CSV preview (200 char): '+csv.substring(0,300);
  
  const parsed=Papa.parse(csv,{header:true,skipEmptyLines:'greedy',trimHeader:true});
  // Normalize header: trim all keys
  const rawData = parsed.data.map(row=>{
    const cleanRow={};
    Object.keys(row).forEach(k=>{
      const cleanKey=k.trim();
      cleanRow[cleanKey]=row[k];
    });
    return cleanRow;
  });

  allData = rawData.map(r=>{
    const brandRaw = (r['Brand']||'').trim();
    if(!brandRaw) return null;
    return {
      waktu: (r['Waktu Push']||'').trim(),
      brandRaw: brandRaw,
      brand: normalizeBrand(brandRaw),
      periode: (r['Periode']||'').trim(),
      reach: toNum(r['Reach']),
      engagement: toNum(r['Engagement']),
      followers: toNum(r['Followers']),
      reachRaw: (r['Reach']||'').trim(),
      engRaw: (r['Engagement']||'').trim(),
      follRaw: (r['Followers']||'').trim(),
    };
  }).filter(Boolean);

  // Sort ascending by waktu string, then later reverse
  allData.sort((a,b)=> a.waktu.localeCompare(b.waktu));

  updateBrands(); 
  updateView();
  document.getElementById('status').textContent=`Data update: ${new Date().toLocaleString('id-ID')} | ${allData.length} baris | valid: ${allData.filter(x=>x.followers>0||x.reach>0).length}`;

 }catch(e){
  document.getElementById('status').textContent='Error: '+e.message;
  document.getElementById('debug').textContent=e.stack;
 }
}

function updateBrands(){
 const brands=[...new Set(allData.map(r=>r.brand))].sort();
 document.getElementById('brandFilter').innerHTML='<option value="">Semua Brand</option>'+brands.map(b=>`<option value="${b}">${b}</option>`).join('');
}
function parseDateFromWaktu(w){
 try{ const d=w.split(' ')[0]; const [day,month,year]=d.split('/'); return `${year}-${month}-${day}`; }catch{ return '' }
}
function getFiltered(){
 const sDate=document.getElementById('startDate').value;
 const eDate=document.getElementById('endDate').value;
 const brand=document.getElementById('brandFilter').value;
 return allData.filter(r=>{
  const rDate=parseDateFromWaktu(r.waktu);
  if(sDate&&rDate&&rDate<sDate) return false;
  if(eDate&&rDate&&rDate>eDate) return false;
  if(brand&&r.brand!==brand) return false;
  return true;
 });
}
function updateView(){
 const data=getFiltered();
 // Ambil latest valid per brand: cari dari belakang yang ada angkanya
 const latest={};
 const grouped={};
 data.forEach(r=>{
  if(!grouped[r.brand]) grouped[r.brand]=[];
  grouped[r.brand].push(r);
 });
 Object.keys(grouped).forEach(brand=>{
  const arr = grouped[brand].slice().reverse(); // terbaru dulu
  let found = arr.find(x=> x.followers>0 || x.reach>0 || x.engagement>0);
  if(!found) found = arr[0]; // kalau semua 0, ambil yang terbaru aja
  if(found) latest[brand]=found;
 });

 const latestArr=Object.values(latest);
 
 const totalFollowers = latestArr.reduce((s,r)=>s+r.followers,0);
 const totalReach = latestArr.reduce((s,r)=>s+r.reach,0);
 const totalEng = latestArr.reduce((s,r)=>s+r.engagement,0);

 document.getElementById('kpiFollowers').textContent=formatNum(totalFollowers);
 document.getElementById('kpiReach').textContent=formatNum(totalReach);
 document.getElementById('kpiEng').textContent=formatNum(totalEng);
 document.getElementById('kpiPosts').textContent=data.length;

 const byFollowers={}; latestArr.forEach(r=>byFollowers[r.brand]=r.followers);
 const byReach={}; latestArr.forEach(r=>byReach[r.brand]=r.reach);

 drawChart('chartBrand',Object.keys(byFollowers),Object.values(byFollowers));
 drawChart('chartReach',Object.keys(byReach),Object.values(byReach));

 document.getElementById('tableBody').innerHTML=data.slice().reverse().slice(0,100).map(r=>{
  return `<tr>
    <td>${r.waktu}</td>
    <td>${r.brand}</td>
    <td>${r.periode}</td>
    <td>${r.reachRaw||0}</td>
    <td>${r.engRaw||0}</td>
    <td>${r.follRaw||0}</td>
  </tr>`;
 }).join('');
}

function drawChart(id,labels,data){
 if(charts[id]) charts[id].destroy();
 charts[id]=new Chart(document.getElementById(id),{
  type:'bar',
  data:{labels,datasets:[{label:'value',data,backgroundColor:'#4a9eff'}]},
  options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#888',maxRotation:45},grid:{color:'#333'}},y:{ticks:{color:'#888'},grid:{color:'#333'}}}}
 });
}

['startDate','endDate','brandFilter'].forEach(id=>{document.getElementById(id).addEventListener('change',updateView);});
loadData(); setInterval(loadData,60000);
</script>
</body>
</html>
