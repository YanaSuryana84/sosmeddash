<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQAEUueYms0SnC-JXracRWmYLZ55VqptcgNGGpAWpnMqIQU7oFhd8KWO4ZXr85ZzOLvfBQX0I9aLEHr/pub?gid=269503424&single=true&output=csv';
let allData = [];
let charts = {};

function toNum(v) {
  if (!v) return 0;
  let s = String(v).trim();
  if (s === '—' || s === '-' || s.toLowerCase() === 'tidak ada' || s === '') return 0;
  // Hapus titik ribu dan teks, contoh: 245.881 akun -> 245881
  s = s.split('(')[0]; // buang "(tidak ditemukan...)"
  s = s.replace(/[^\d]/g, '');
  return parseInt(s) || 0;
}
function formatNum(n) {
  if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
  if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
  return n.toLocaleString('id-ID');
}
function normalizeBrand(b) {
  b = b.trim().toLowerCase();
  if (b.includes('sedjati eco')) return 'SEF';
  if (b.includes('labbaik')) return 'Labbaik Chicken';
  if (b.includes('waydee')) return 'Waydee';
  if (b.includes('sedjati coffee')) return 'Sedjati Coffee';
  if (b.includes('luqman') || b === 'lh') return 'LH';
  if (b.includes('baso')) return 'Baso Kajojo';
  if (b.includes('spud')) return 'Spud Potata';
  if (b.includes('obie')) return 'Obie Donat';
  if (b === 'ofc') return 'OFC';
  return b.toUpperCase();
}
async function loadData() {
  try {
    const res = await fetch(CSV_URL);
    const csv = await res.text();
    const parsed = Papa.parse(csv, { header: true, skipEmptyLines: 'greedy' });
    allData = parsed.data.map(r => {
      const brandKey = Object.keys(r).find(k => k.trim().toLowerCase() === 'brand') || 'Brand';
      const rawBrand = (r[brandKey] || '').trim();
      return {
        waktu: r['Waktu Push'] || '',
        brandRaw: rawBrand,
        brand: normalizeBrand(rawBrand),
        periode: r['Periode'] || '',
        reach: toNum(r['Reach']),
        engagement: toNum(r['Engagement']),
        followers: toNum(r['Followers']),
        reachRaw: r['Reach'] || '',
      };
    }).filter(r => r.brandRaw);

    // Urutkan by waktu
    allData.sort((a,b) => a.waktu > b.waktu? 1 : -1);

    updateBrands();
    updateView();
    document.getElementById('status').textContent = `Data update: ${new Date().toLocaleString('id-ID')} | ${allData.length} baris`;
  } catch(e) {
    document.getElementById('status').textContent = 'Error: ' + e;
  }
}
function updateBrands() {
  const brands = [...new Set(allData.map(r => r.brand))].sort();
  document.getElementById('brandFilter').innerHTML = '<option value="">Semua Brand</option>' +
    brands.map(b => `<option value="${b}">${b}</option>`).join('');
}
function parseDateFromWaktu(w) {
  try {
    const d = w.split(' ')[0];
    const [day, month, year] = d.split('/');
    return `${year}-${month}-${day}`;
  } catch { return '' }
}
function getFiltered() {
  const sDate = document.getElementById('startDate').value;
  const eDate = document.getElementById('endDate').value;
  const brand = document.getElementById('brandFilter').value;
  return allData.filter(r => {
    const rDate = parseDateFromWaktu(r.waktu);
    if (sDate && rDate < sDate) return false;
    if (eDate && rDate > eDate) return false;
    if (brand && r.brand!== brand) return false;
    return true;
  });
}
function updateView() {
  const data = getFiltered();
  // Ambil latest YANG ADA ANGKA, bukan yang 0
  const latest = {};
  [...data].reverse().forEach(r => {
    if (!latest[r.brand]) {
      latest[r.brand] = r;
    } else {
      // kalau yang sudah kesimpen 0, ganti kalau yang baru ada angka
      if ((latest[r.brand].followers === 0 && r.followers > 0) ||
          (latest[r.brand].reach === 0 && r.reach > 0)) {
        latest[r.brand] = r;
      }
    }
  });
  const latestArr = Object.values(latest);

  document.getElementById('kpiFollowers').textContent = formatNum(latestArr.reduce((s,r) => s + r.followers, 0));
  document.getElementById('kpiReach').textContent = formatNum(latestArr.reduce((s,r) => s + r.reach, 0));
  document.getElementById('kpiEng').textContent = formatNum(latestArr.reduce((s,r) => s + r.engagement, 0));
  document.getElementById('kpiPosts').textContent = data.length;

  const byFollowers = {};
  latestArr.forEach(r => byFollowers[r.brand] = r.followers);
  const byReach = {};
  latestArr.forEach(r => byReach[r.brand] = r.reach);

  drawChart('chartBrand', Object.keys(byFollowers), Object.values(byFollowers));
  drawChart('chartReach', Object.keys(byReach), Object.values(byReach));

  document.getElementById('tableBody').innerHTML = data.slice().reverse().slice(0, 100).map(r => `
    <tr>
      <td>${r.waktu}</td><td>${r.brand}</td><td>${r.periode}</td>
      <td>${r.reachRaw || r.reach}</td><td>${r.engagement || 0}</td><td>${r.followers || 0}</td>
    </tr>
  `).join('');
}
function drawChart(id, labels, data) {
  if (charts[id]) charts[id].destroy();
  charts[id] = new Chart(document.getElementById(id), {
    type: 'bar',
    data: { labels, datasets: [{ data, backgroundColor: '#4a9eff' }] },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#888', maxRotation: 45 }, grid: { color: '#333' } },
        y: { ticks: { color: '#888' }, grid: { color: '#333' } }
      }
    }
  });
}
['startDate','endDate','brandFilter'].forEach(id => {
  document.getElementById(id).addEventListener('change', updateView);
});
loadData();
setInterval(loadData, 60000);
</script>
